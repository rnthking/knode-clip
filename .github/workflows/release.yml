name: Release KnodeClip

# 推送 v* tag（git tag v3.0.0 && git push origin v3.0.0）或手动 Run。
# macOS = 原生 Swift 版（划词开关 + 自动药丸浮窗 + AI 解读卡片，需辅助功能授权）。
# Windows = Electron 热键版（选中文字按 Ctrl+Shift+K 收集）。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------- macOS：原生 Swift ----------
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build native Swift app
        run: |
          cd macos-swift
          chmod +x build.sh
          ./build.sh
      - name: Package dmg
        run: |
          cd macos-swift
          mkdir -p dist
          hdiutil create -volname "KnodeClip" -srcfolder "KnodeClip.app" -ov -format UDZO "dist/KnodeClip-mac.dmg"
      - name: Compute tag
        id: t
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"; else echo "tag=v-manual-${{ github.run_number }}" >> "$GITHUB_OUTPUT"; fi
      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.t.outputs.tag }}
          name: KnodeClip ${{ steps.t.outputs.tag }}
          make_latest: true
          body: |
            **KnodeClip**
            - **macOS（原生版 · 推荐）**：下载 `KnodeClip-mac.dmg` → 拖到「应用程序」。未签名：首次右键→打开；如提示「已损坏」，终端执行 `xattr -dr com.apple.quarantine /Applications/KnodeClip.app`。首次运行在「系统设置→隐私与安全性→辅助功能」勾选 KnodeClip。
              用法：菜单栏图标 → 登录 → 按 `⌘⇧K` 开启划词（绿点🟢）→ 选中文字松手即弹药丸浮窗「收集 / ✨解读」→ ✨解读弹卡片 → 「加入卡片」。
            - **Windows（Electron 热键版）**：下载 `KnodeClip-win.exe` 安装。选中文字按 `Ctrl+Shift+K` 收集（收集模式在托盘菜单切）。
          files: |
            macos-swift/dist/KnodeClip-mac.dmg

  # ---------- Windows：Electron ----------
  win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install
      - name: Build (electron-builder, win only)
        run: npx electron-builder --win --publish never
      - name: Compute tag
        id: t
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"; else echo "tag=v-manual-${{ github.run_number }}" >> "$GITHUB_OUTPUT"; fi
      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.t.outputs.tag }}
          name: KnodeClip ${{ steps.t.outputs.tag }}
          make_latest: true
          files: |
            release/*.exe
