name: Release KnodeClip

# 推送 v* tag（git tag v2.0.0 && git push origin v2.0.0）或手动 Run；
# 在 macOS 与 Windows 两个 runner 上各自用 electron-builder 出安装包，统一上传到同一个 Release。
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: npm install
      - name: Build (electron-builder)
        run: npx electron-builder --publish never
      - name: Compute tag
        id: t
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"; else echo "tag=v-manual-${{ github.run_number }}" >> "$GITHUB_OUTPUT"; fi
      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.t.outputs.tag }}
          name: KnodeClip ${{ steps.t.outputs.tag }}
          make_latest: true
          body: |
            **KnodeClip 跨平台（Windows / macOS）**
            - macOS：下载 `KnodeClip-mac.dmg`，拖到「应用程序」。未签名：首次右键→打开；如提示「已损坏」，终端执行 `xattr -dr com.apple.quarantine /Applications/KnodeClip.app`。还需在「系统设置→隐私与安全性→辅助功能」勾选 KnodeClip（模拟复制要用）。
            - Windows：下载 `KnodeClip-win.exe` 安装。首次运行 SmartScreen 提示「更多信息→仍要运行」。
            用法：登录同一账号 → 选中文字 → 按 `Ctrl/⌘+Shift+K` 收集。
          files: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
